<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolsa De Empleo</title>
    <meta name="description" content="Bolsa de empleo corporativo. Contacto directo con empleadores.">
    <meta name="theme-color" content="#4f46e5">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://via.placeholder.com; connect-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self';">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="access-gate" class="overlay">
        <div class="overlay-card">
            <div class="overlay-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
                </svg>
            </div>
            <h2>Puerta De Acceso</h2>
            <p class="overlay-subtitle">Escribe la clave que se te otorgo para entrar</p>
            <form id="access-form" autocomplete="off">
                <div class="input-wrapper">
                    <input type="password" id="access-code" placeholder="TU CLAVE" maxlength="20" required autocomplete="off" aria-label="Código de acceso" />
                    <span class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                    </span>
                </div>
                <button type="submit">ENTRAR</button>
            </form>
            <p id="access-error" class="error-msg" style="display:none;" role="alert"></p>
        </div>
    </div>

    <div id="app-content" style="display:none;">
        <header class="main-header">
            <div class="header-container">
                <div class="logo" aria-label="Bolsa De Empleo">
                    <div class="logo-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                        </svg>
                    </div>
                    <span class="logo-text">BOLSA DE EMPLEO</span>
                </div>
            </div>
        </header>
        <main>
            <section id="vacantes" class="page-section active">
                <div class="section-header">
                    <div class="section-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M8 7V5a2 2 0 012-2h4a2 2 0 012 2v2"/>
                        </svg>
                    </div>
                    <div class="section-heading">
                        <h2 class="section-title">Vacantes Disponibles</h2>
                        <p class="section-subtitle">Encuentra tu oportunidad de trabajo aquí</p>
                    </div>
                </div>
                <div class="jobs-grid" id="jobs-container"></div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
